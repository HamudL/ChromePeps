version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chromepeps-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chromepeps
      POSTGRES_USER: chromepeps
      POSTGRES_PASSWORD: chromepeps_secret
    # Loopback-only: Dev-DB mit Default-Passwort darf nie auf 0.0.0.0 lauschen
    # (z.B. im Hotel-/Office-LAN sonst von außen erreichbar).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chromepeps"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chromepeps-redis
    restart: unless-stopped
    # Loopback-only — ungeschütztes Redis gehört nicht ins lokale Netz.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
  redisdata:
