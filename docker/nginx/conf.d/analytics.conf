# ================================================================
# Plausible Analytics — analytics.chromepeps.com
# Reverse proxy to the plausible container on port 8000.
# ================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name analytics.chromepeps.com;

    # ---- SSL (same cert chain style as main domain) ----
    ssl_certificate /etc/letsencrypt/live/analytics.chromepeps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.chromepeps.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/analytics.chromepeps.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ---- Security Headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;

    # ---- Proxy everything to Plausible ----
    location / {
        proxy_pass http://plausible;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Plausible tracking script — long cache, no access log ----
    location = /js/script.js {
        proxy_pass http://plausible;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- Plausible event ingestion ----
    location = /api/event {
        proxy_pass http://plausible;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ---- Block dot-files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
