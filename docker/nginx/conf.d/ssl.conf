server {
    # `listen ... http2` ist seit nginx 1.25.1 deprecated — die
    # eigenständige http2-Direktive ist der ersatzlose Nachfolger.
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chromepeps.com www.chromepeps.com;

    # ---- SSL Configuration ----
    ssl_certificate /etc/letsencrypt/live/chromepeps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chromepeps.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/chromepeps.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ---- Security Headers ----
    # Zentral in security-headers.inc (X-Frame-Options DENY — konsistent mit
    # Next.js). ACHTUNG nginx-Vererbung: Locations mit eigenem add_header
    # (Cache-Control unten) verlieren die server-level Header und müssen die
    # Datei deshalb selbst nochmal includen.
    include /etc/nginx/conf.d/security-headers.inc;

    server_tokens off;
    limit_conn addr 100;

    # ---- Static Assets ----
    location /_next/static/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
        # add_header im Block ⇒ server-level Header weg — re-includen.
        include /etc/nginx/conf.d/security-headers.inc;
        access_log off;
    }

    location /images/ {
        proxy_pass http://nextjs;
        expires 30d;
        add_header Cache-Control "public";
        include /etc/nginx/conf.d/security-headers.inc;
        access_log off;
    }

    location /fonts/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.inc;
        access_log off;
    }

    # ---- Uploaded Files (served directly by nginx, not Next.js) ----
    # Next.js standalone doesn't serve files added to public/ at runtime.
    # The uploads volume is shared between app (write) and nginx (read).
    # security-headers.inc liefert hier u.a. X-Content-Type-Options: nosniff —
    # wichtig, weil User-Uploads sonst per Content-Sniffing als HTML/JS
    # interpretiert werden könnten.
    location /uploads/ {
        alias /app/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        include /etc/nginx/conf.d/security-headers.inc;
        access_log off;
    }

    # ---- API Routes ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Stripe Webhook ----
    location /api/stripe/webhook {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # ---- All Other Routes ----
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Block sensitive paths ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|\.git|docker-compose|Dockerfile) {
        deny all;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
