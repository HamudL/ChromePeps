services:
  app:
    # Image is built by GitHub Actions and pushed to GHCR.
    # VPS only pulls the pre-built image — no more heavy builds on the
    # production server that could OOM the whole VPS.
    image: ghcr.io/hamudl/chromepeps:latest
    pull_policy: always
    container_name: chromepeps-app
    restart: unless-stopped
    # Runtime memory cap — prevents the Node.js app from growing unbounded and
    # triggering the OOM killer on the 1.8 GB VPS.
    mem_limit: 512m
    memswap_limit: 768m
    env_file:
      - ../.env
    # SECURITY (H13): Loopback-only. nginx erreicht die App über das interne
    # Compose-Netz (upstream "app:3000" in nginx/nginx.conf) und braucht das
    # Host-Publishing nicht. Ohne 127.0.0.1-Bindung wäre Port 3000 direkt aus
    # dem Internet erreichbar (Docker schreibt iptables-Regeln VOR den
    # UFW-Regeln → UFW schützt published Ports nicht). Das Binding bleibt nur
    # fürs lokale Debugging auf dem VPS (curl 127.0.0.1:3000) erhalten.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: chromepeps-db
    restart: unless-stopped
    # SECURITY: Kein env_file mehr — das lud ALLE App-Secrets (Stripe, Auth,
    # Resend, …) in den Postgres-Container (Blast-Radius bei Container-
    # Kompromittierung). Postgres braucht nur seine drei POSTGRES_*-Werte.
    # ${POSTGRES_PASSWORD} wird von deploy.sh/rollback.sh via `set -a;
    # source ../.env` in die Shell exportiert, bevor docker compose läuft.
    # Bei manuellen Aufrufen ohne sourcen: vorher `set -a; source ../.env;
    # set +a` (nur für die ERSTE Initialisierung des pgdata-Volumes nötig —
    # ein bereits initialisiertes Volume ignoriert POSTGRES_*-Variablen).
    environment:
      POSTGRES_DB: chromepeps
      POSTGRES_USER: chromepeps
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chromepeps"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chromepeps-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  nginx:
    build: ./nginx
    container_name: chromepeps-nginx
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 192m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      - uploads:/app/public/uploads:ro
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # Plausible Analytics (self-hosted, cookieless, DSGVO-konform)
  # https://github.com/plausible/community-edition  v3.2.0
  # ---------------------------------------------------------------------------

  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.0
    container_name: chromepeps-plausible
    profiles: ["analytics"]
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    volumes:
      - plausible-data:/var/lib/plausible
    # Hard cap to prevent BEAM VM from eating all RAM and triggering OOM killer.
    # 512 MB is plenty for a low-traffic analytics dashboard.
    mem_limit: 512m
    memswap_limit: 768m
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      - TMPDIR=/var/lib/plausible/tmp
      - BASE_URL=${PLAUSIBLE_BASE_URL}
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE}
      - DATABASE_URL=postgres://plausible:plausible@plausible_db:5432/plausible
      - CLICKHOUSE_DATABASE_URL=http://plausible_events_db:8123/plausible_events_db
      - HTTP_PORT=8000
      - DISABLE_REGISTRATION=${PLAUSIBLE_DISABLE_REGISTRATION:-invite_only}
      # Tell BEAM to stay within the container memory limit
      - ERL_FLAGS=+MIscs 256

  plausible_db:
    image: postgres:16-alpine
    container_name: chromepeps-plausible-db
    profiles: ["analytics"]
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 192m
    volumes:
      - plausible-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: plausible
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: chromepeps-clickhouse
    profiles: ["analytics"]
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 384m
    volumes:
      - plausible-events:/var/lib/clickhouse
      - plausible-event-logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot-webroot:
  plausible-data:
  plausible-pgdata:
  plausible-events:
  plausible-event-logs:
