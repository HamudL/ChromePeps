name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency pro Ref:
#  - Pushes auf main teilen sich die Gruppe "...-refs/heads/main" → Deploys
#    bleiben strikt serialisiert (queuen, werden NIE mittendrin gecancelt).
#  - Jeder PR bekommt seine eigene Gruppe → PRs blockieren weder einander
#    noch den Deploy. Veraltete PR-Läufe (neuer Push auf denselben PR)
#    werden gecancelt, um Runner zu sparen.
concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint + Typecheck
  # ──────────────────────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit

      # Nicht-blockierend: meldet bekannte CVEs in Prod-Dependencies im Log,
      # ohne PRs/Deploys an (oft nicht sofort fixbaren) Advisories scheitern
      # zu lassen. Bewusst nur --omit=dev: devDeps laufen nie in Produktion.
      - name: npm audit (prod deps, non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 2. Unit & Component Tests
  # ──────────────────────────────────────────────
  unit-tests:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:run

  # ──────────────────────────────────────────────
  # 3. E2E (Playwright) — smoke against `next start`
  # ──────────────────────────────────────────────
  # Postgres + Redis as services so prisma migrate + seed can run.
  # Wir bauen einmal die App, starten sie als Production-Server und
  # schicken Playwright dagegen. Smoke-Scope: cookie-consent, cart,
  # product-catalog, wissen, auth-forms, checkout-shell. KEIN echter
  # Stripe-Roundtrip (das ist über die Webhook-Unit-Tests abgedeckt).
  # AUDIT_REPORT_v3 §6 PR 3.
  e2e:
    needs: unit-tests
    runs-on: ubuntu-latest
    # 30 min weil playwright install bei kalten Runners 1-2 min Browser-
    # Download macht, dazu kommt npm ci (30s), build (90s), tests (5-7 min)
    # plus Postgres+Redis-Boot. Bei 20 min wurde der Job einmal gerade in
    # `playwright install` gecancelled (Run #144).
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chromepeps
          POSTGRES_PASSWORD: chromepeps
          POSTGRES_DB: chromepeps_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chromepeps"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://chromepeps:chromepeps@localhost:5432/chromepeps_e2e
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-secret-not-for-prod
      AUTH_SECRET: e2e-secret-not-for-prod
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # NextAuth v5 weigert sich per Default Hosts ohne explizites Trust-
      # Setting zu akzeptieren. In Prod liefert Vercel/Next das implizit,
      # in unserem Production-Build (npm run start) auf einem GitHub-
      # Runner aber nicht — und der Test floodet den Log mit hunderten
      # `[auth][error] UntrustedHost` Meldungen pro Run. Tests laufen
      # trotzdem grün (die Errors blockieren keine Logik), aber die
      # Logs sind unleserlich. AUTH_TRUST_HOST=true ist die offizielle
      # Empfehlung für Self-Hosting / Test-Setups.
      AUTH_TRUST_HOST: "true"
      # Stripe + Resend bleiben in den E2E-Tests nicht erreichbar — die
      # Tests stoppen vor dem Stripe-Redirect. Dummies reichen damit die
      # App nicht beim Boot crasht.
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      RESEND_API_KEY: re_dummy
      # src/lib/mail/client.ts liest MAIL_FROM (+ optional MAIL_REPLY_TO) —
      # die früheren MAIL_FROM_ADDRESS/MAIL_FROM_NAME existieren im Code nicht.
      MAIL_FROM: "ChromePeps <noreply@example.com>"
      CRON_SECRET: dummy
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # `db push` ist hier OK weil die E2E-DB jedes Mal frisch ist —
      # echte Migrations brauchen wir für den Smoke nicht.
      - run: npx prisma db push --skip-generate
      - run: npx prisma db seed
      - run: npm run build
      # Playwright-Browser nur Chromium (siehe playwright.config.ts).
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3b. Docker-Build-Check (nur PRs, ohne Push)
  # ──────────────────────────────────────────────
  # Vorher lief der Docker-Build erst NACH dem Merge auf main — ein PR
  # konnte den Build brechen (Dockerfile, prisma generate, next build im
  # Container) und das fiel erst beim Deploy-Lauf auf. Dieser Job baut das
  # Image auf PRs mit identischem Kontext/Dockerfile, pusht aber nichts.
  # Sentry-Build-Args fehlen bewusst: das Dockerfile behandelt fehlende
  # Tokens als No-op (kein Source-Map-Upload) — so funktioniert der Job
  # auch für Fork-PRs ohne Secret-Zugriff.
  docker-build-check:
    needs: lint-and-typecheck
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: chromepeps:pr-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=https://chromepeps.com

  # ──────────────────────────────────────────────
  # 4. Build Docker image + push to GHCR
  # ──────────────────────────────────────────────
  # Image is built in the cloud (free GitHub runners) and pushed to
  # GitHub Container Registry. The VPS then just pulls the pre-built
  # image in seconds, avoiding OOM crashes from building on the 1.8 GB VPS.
  build-and-push:
    needs: [unit-tests, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build-time env wiring. SENTRY_AUTH_TOKEN/ORG/PROJECT werden von
          # withSentryConfig (next.config.ts) genutzt, um Source-Maps
          # hochzuladen — sie landen NICHT im fertigen Image, sondern
          # werden nur während `next build` gebraucht. DSN ist bewusst
          # ein NEXT_PUBLIC_* und wird in den Client-Bundle inlined.
          build-args: |
            NEXT_PUBLIC_APP_URL=https://chromepeps.com
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_HCAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_HCAPTCHA_SITE_KEY }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

  # ──────────────────────────────────────────────
  # 4. Deploy to VPS (only on push to main)
  # ──────────────────────────────────────────────
  # The deploy just runs bash deploy.sh on the VPS, which now pulls
  # the pre-built image from GHCR instead of building locally.
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 5m
          script: |
            cd /opt/chromepeps/docker && bash deploy.sh
